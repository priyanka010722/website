<!DOCTYPE html>
<html>
<head>
<title>Wishlist</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<h1>Wishlist ❤️</h1>

<div class="grid">

{% for item in items %}

<div class="card">

<img src="{{ item.image }}">

<h3>{{ item.name }}</h3>
<p>₹{{ item.price }}</p>

</div>

{% endfor %}
<div class="grid">

{% for item in items %}


<div class="card">

    <img src="{{ item.image }}">

    <h3>{{ item.name }}</h3>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
