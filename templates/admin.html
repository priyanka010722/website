<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="container">

<h1 class="mt-4">Admin Dashboard</h1>

<div class="row mt-4">

    <div class="col-md-3">
        <div class="card p-3">
            <h3>{{ total_users }}</h3>
            <p>Users</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3">
            <h3>{{ total_products }}</h3>
            <p>Products</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3">
            <h3>{{ total_orders }}</h3>
            <p>Orders</p>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card p-3">
            <h3>₹{{ revenue }}</h3>
            <p>Revenue</p>
        </div>
    </div>

</div>

<div class="mt-4">

    <a href="/admin/products" class="btn btn-primary">Manage Products</a>
    <a href="/admin/orders" class="btn btn-success">Manage Orders</a>
    <a href="/admin/users" class="btn btn-warning">Manage Users</a>

</div>

<div class="mt-5">
    <h3>Analytics</h3>
    <canvas id="salesChart"></canvas>
</div>

<script>
const ctx = document.getElementById('salesChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Users', 'Products', 'Orders'],
        datasets: [{
            label: 'Store Statistics',
            data: [
                {{ total_users }},
                {{ total_products }},
                {{ total_orders }}
            ]
        }]
    }
});
</script>

</body>
</html>
