<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<div class="form-box">

<h2>Login</h2>
<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<form method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>
</form>

<p>
Don't have an account?
<a href="/register">Register</a>
</p>

</div>

</div>

</body>
</html>
