<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>Edit Product</h1>

    <img src="{{ product.image }}"
         class="product-image"
         alt="Product Image">

    <form method="POST">

        <label>Product Name</label>
        <input type="text"
               name="name"
               value="{{ product.name }}"
               required>

        <label>Price</label>
        <input type="number"
               name="price"
               value="{{ product.price }}"
               required>

        <label>Image URL</label>
        <input type="text"
               name="image"
               value="{{ product.image }}">

        <label>Description</label>
        <textarea name="description">{{ product.description }}</textarea>

        <br><br>

        <button type="submit">
            Update Product
        </button>

    </form>

</div>
</body>
</html>
